name: RDP 2026 (Windows 11)

on:
  workflow_dispatch:
    inputs:
      ts_authkey:
        description: "Tailscale Auth Key"
        required: true
      backup_number:
        description: "MuMu Backup Number (1, 2, 3...)"
        required: true

permissions:
  contents: read
  actions: write

env:
  RDP_USER: "Automation King Taz"
  RDP_PASS: "1234@AutomationKingTaz"
  BACKUP_LIST_URL: "http://94.130.138.166/f/HapiBackupFileURLs.txt"
  UPDATE_API: "http://94.130.138.166:8080/rdp/hapi/update.php"
  MUMU_URL: "http://94.130.138.166/f/HapiRDPFiles/MuMu.exe"
  HAPIBOT_ZIP_URL: "http://94.130.138.166/f/Bot/Latest/HapiBot/HapiBot.zip"
  CDOWN_URL: "http://94.130.138.166/f/HapiRDPFiles/cDown.bat"
  CSTART_URL: "http://94.130.138.166/f/HapiRDPFiles/cStart.bat"
  START_URL: "http://94.130.138.166/f/HapiRDPFiles/Start.bat"
  BAT1_URL: "http://94.130.138.166/f/HapiRDPFiles/bat_file_1.bat"
  BAT2_URL: "http://94.130.138.166/f/HapiRDPFiles/bat_file_2.bat"
  BAT3_URL: "http://94.130.138.166/f/HapiRDPFiles/bat_file_3.bat"
  PY1_URL: "http://94.130.138.166/f/HapiRDPFiles/python_file_1.py"
  PY2_URL: "http://94.130.138.166/f/HapiRDPFiles/python_file_2.py"
  PY3_URL: "http://94.130.138.166/f/HapiRDPFiles/python_file_3.py"

jobs:
  rdp-session:
    name: "Windows RDP — Backup #${{ inputs.backup_number }}"
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Show runner info
        shell: pwsh
        run: |
          whoami
          systeminfo | findstr /B /C:"OS Name"

      - name: Install and Start Tailscale
        shell: pwsh
        run: |
          $exe = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (-not (Test-Path $exe)) {
            Invoke-WebRequest "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" -OutFile tailscale.msi
            Start-Process msiexec.exe -ArgumentList "/i tailscale.msi /quiet /norestart" -Wait
          }
          Start-Service Tailscale
          Start-Sleep 10
          & $exe up --authkey "${{ inputs.ts_authkey }}" --hostname "bullet"
          for ($i=0; $i -lt 10; $i++) {
            $ip = & $exe ip -4 | Select-Object -First 1
            if ($ip) { break }
            Start-Sleep 3
          }
          if (-not $ip) { throw "Tailscale IP not found" }
          echo "TS_IP=$ip" >> $env:GITHUB_ENV
          Write-Host "Tailscale IP: $ip"

      - name: Enable RDP and Create User Profile
        shell: pwsh
        run: |
          $sec = ConvertTo-SecureString $env:RDP_PASS -AsPlainText -Force
          if (-not (Get-LocalUser $env:RDP_USER -EA SilentlyContinue)) {
            New-LocalUser $env:RDP_USER -Password $sec
            Add-LocalGroupMember Administrators $env:RDP_USER
            Add-LocalGroupMember "Remote Desktop Users" $env:RDP_USER
          }
          Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Write-Host "Creating user profile..."
          Add-Type -TypeDefinition @"
          using System;
          using System.Runtime.InteropServices;
          using System.Text;
          public class ProfileHelper {
              [DllImport("userenv.dll", CharSet = CharSet.Unicode, SetLastError = true)]
              public static extern int CreateProfile(
                  string pszUserSid,
                  string pszUserName,
                  StringBuilder pszProfilePath,
                  uint cchProfilePath);
          }
          "@
          $user = Get-LocalUser $env:RDP_USER
          $sid  = $user.SID.Value
          $pathBuilder = New-Object System.Text.StringBuilder 260
          $result = [ProfileHelper]::CreateProfile($sid, $env:RDP_USER, $pathBuilder, 260)
          $profilePath = $pathBuilder.ToString()
          if ($profilePath -and (Test-Path $profilePath)) {
            $desktop = "$profilePath\Desktop"
          } else {
            $desktop = "C:\Users\$($env:RDP_USER)\Desktop"
            New-Item -ItemType Directory -Path $desktop -Force | Out-Null
          }
          if (-not (Test-Path $desktop)) {
            New-Item -ItemType Directory -Path $desktop -Force | Out-Null
          }
          icacls $desktop /grant "${env:RDP_USER}:(OI)(CI)F" /T /Q
          Write-Host "Desktop path: $desktop"
          echo "USER_DESKTOP=$desktop" >> $env:GITHUB_ENV

      - name: Show IP and Serial
        shell: pwsh
        run: |
          Write-Host "=========================================="
          Write-Host "  $env:TS_IP  |  ${{ inputs.backup_number }}"
          Write-Host "=========================================="

      - name: Download All Files (Backup #${{ inputs.backup_number }})
        shell: pwsh
        run: |
          $desktop = $env:USER_DESKTOP
          $num = "${{ inputs.backup_number }}".Trim()

          Write-Host "Fetching backup list..."
          $wc = New-Object System.Net.WebClient
          $txtContent = $wc.DownloadString($env:BACKUP_LIST_URL)
          $lines = ($txtContent -replace "`r", "") -split "`n" | Where-Object { $_.Trim() -ne "" }
          Write-Host "Total lines: $($lines.Count)"

          $found      = $false
          $backupName = ""
          $backupUrl  = ""

          foreach ($line in $lines) {
            $parts = $line.Trim() -split '[|]', 3
            if ($parts.Count -ge 3 -and $parts[0].Trim() -eq $num) {
              $backupName = $parts[1].Trim()
              $backupUrl  = $parts[2].Trim()
              $found = $true
              break
            }
          }

          if (-not $found) {
            Write-Host "DEBUG: Looking for: [$num]"
            $previewMax = [Math]::Min(5, $lines.Count)
            foreach ($l in $lines[0..($previewMax-1)]) { Write-Host "LINE: [$l]" }
            throw "Backup number $num not found!"
          }

          Write-Host "Backup: $backupName"
          Write-Host "URL: $backupUrl"

          $job1 = Start-Job -Name "MuMu" -ScriptBlock {
            param($url, $dest)
            $wc = New-Object System.Net.WebClient
            $wc.DownloadFile($url, $dest)
            Write-Host "MuMu done: $((Get-Item $dest).Length) bytes"
          } -ArgumentList $env:MUMU_URL, "$desktop\MuMu.exe"

          $job2 = Start-Job -Name "HapiBot" -ScriptBlock {
            param($url, $dest)
            $wc = New-Object System.Net.WebClient
            $zipPath = "$dest\HapiBot.zip"
            $wc.DownloadFile($url, $zipPath)
            Expand-Archive -Path $zipPath -DestinationPath "$dest\HapiBot" -Force
            Remove-Item $zipPath -Force
            Write-Host "HapiBot done"
          } -ArgumentList $env:HAPIBOT_ZIP_URL, $desktop

          $job3 = Start-Job -Name "Backup" -ScriptBlock {
            param($url, $dest)
            $maxRetry = 3
            $attempt  = 0
            while ($attempt -lt $maxRetry) {
              $attempt++
              try {
                Write-Host "Backup attempt $attempt..."
                if (Test-Path $dest) { Remove-Item $dest -Force }
                Start-BitsTransfer -Source $url -Destination $dest -TransferType Download -ErrorAction Stop
                $size = (Get-Item $dest).Length
                if ($size -gt 1024) {
                  Write-Host "Backup SUCCESS: $size bytes"
                  break
                } else {
                  throw "File too small: $size bytes"
                }
              } catch {
                Write-Host "Attempt $attempt FAILED: $_"
                if (Test-Path $dest) { Remove-Item $dest -Force }
                if ($attempt -lt $maxRetry) { Start-Sleep -Seconds ($attempt * 15) }
              }
            }
            if (-not (Test-Path $dest) -or (Get-Item $dest).Length -lt 1024) {
              throw "Backup FAILED after $maxRetry attempts!"
            }
          } -ArgumentList $backupUrl, "$desktop\$backupName"

          $job4 = Start-Job -Name "CDownBat" -ScriptBlock {
            param($url, $dest)
            $wc = New-Object System.Net.WebClient
            $wc.DownloadFile($url, $dest)
            Write-Host "cDown.bat done"
          } -ArgumentList $env:CDOWN_URL, "$desktop\cDown.bat"

          $job5 = Start-Job -Name "StartBat" -ScriptBlock {
            param($url, $dest)
            $wc = New-Object System.Net.WebClient
            $wc.DownloadFile($url, $dest)
            Write-Host "Start.bat done"
          } -ArgumentList $env:START_URL, "$desktop\Start.bat"

          $job6 = Start-Job -Name "CStartBat" -ScriptBlock {
            param($url, $dest)
            $wc = New-Object System.Net.WebClient
            $wc.DownloadFile($url, $dest)
            Write-Host "cStart.bat done"
          } -ArgumentList $env:CSTART_URL, "$desktop\cStart.bat"

          $job7 = Start-Job -Name "Bat1" -ScriptBlock {
            param($url, $dest)
            $wc = New-Object System.Net.WebClient
            $wc.DownloadFile($url, $dest)
            Write-Host "bat_file_1.bat done"
          } -ArgumentList $env:BAT1_URL, "$desktop\bat_file_1.bat"

          $job8 = Start-Job -Name "Bat2" -ScriptBlock {
            param($url, $dest)
            $wc = New-Object System.Net.WebClient
            $wc.DownloadFile($url, $dest)
            Write-Host "bat_file_2.bat done"
          } -ArgumentList $env:BAT2_URL, "$desktop\bat_file_2.bat"

          $job9 = Start-Job -Name "Bat3" -ScriptBlock {
            param($url, $dest)
            $wc = New-Object System.Net.WebClient
            $wc.DownloadFile($url, $dest)
            Write-Host "bat_file_3.bat done"
          } -ArgumentList $env:BAT3_URL, "$desktop\bat_file_3.bat"

          $job10 = Start-Job -Name "Py1" -ScriptBlock {
            param($url, $dest)
            $wc = New-Object System.Net.WebClient
            $wc.DownloadFile($url, $dest)
            Write-Host "python_file_1.py done"
          } -ArgumentList $env:PY1_URL, "$desktop\python_file_1.py"

          $job11 = Start-Job -Name "Py2" -ScriptBlock {
            param($url, $dest)
            $wc = New-Object System.Net.WebClient
            $wc.DownloadFile($url, $dest)
            Write-Host "python_file_2.py done"
          } -ArgumentList $env:PY2_URL, "$desktop\python_file_2.py"

          $job12 = Start-Job -Name "Py3" -ScriptBlock {
            param($url, $dest)
            $wc = New-Object System.Net.WebClient
            $wc.DownloadFile($url, $dest)
            Write-Host "python_file_3.py done"
          } -ArgumentList $env:PY3_URL, "$desktop\python_file_3.py"

          $allJobs = @($job1, $job2, $job3, $job4, $job5, $job6, $job7, $job8, $job9, $job10, $job11, $job12)
          $allJobs | Wait-Job

          Write-Host "===== Job Results ====="
          foreach ($job in $allJobs) {
            $out = Receive-Job $job 2>&1
            Write-Host "$($job.Name): $($job.State) -- $out"
          }

          $failed = $allJobs | Where-Object { $_.State -eq "Failed" }
          $allJobs | Remove-Job -Force

          if ($failed) {
            throw "FAILED jobs: $($failed.Name -join ', ')"
          }

          Write-Host "All Downloads Finished!"

      - name: Register Auto-Start on RDP Login
        shell: pwsh
        run: |
          $desktop    = $env:USER_DESKTOP
          $scriptPath = "$desktop\Start.bat"
          $delayScript = "$desktop\StartDelayed.bat"
          $user       = $env:RDP_USER

          Write-Host "===== Registering Task Scheduler ====="
          Write-Host "Script : $scriptPath"
          Write-Host "User   : $user"

          if (-not (Test-Path $scriptPath)) {
            Write-Host "[!] WARNING: Start.bat এখনো নেই — তবে task register হবে, login এর সময় থাকবে।"
          }

          $delayContent = @(
            '@echo off',
            "cd /d `"$desktop`"",
            'timeout /t 15 /nobreak >nul',
            "call `"$scriptPath`""
          )
          Set-Content -Path $delayScript -Value $delayContent -Encoding ASCII

          $action = New-ScheduledTaskAction `
            -Execute          "cmd.exe" `
            -Argument         "/c `"$delayScript`"" `
            -WorkingDirectory $desktop

          $trigger = New-ScheduledTaskTrigger -AtLogOn -User $user

          $settings = New-ScheduledTaskSettingsSet `
            -AllowStartIfOnBatteries `
            -DontStopIfGoingOnBatteries `
            -ExecutionTimeLimit    (New-TimeSpan -Hours 6) `
            -RestartCount          3 `
            -RestartInterval       (New-TimeSpan -Minutes 1) `
            -StartWhenAvailable

          $principal = New-ScheduledTaskPrincipal `
            -UserId    $user `
            -LogonType Interactive `
            -RunLevel  Highest

          Register-ScheduledTask `
            -TaskName   "YariAutoStart" `
            -Action     $action `
            -Trigger    $trigger `
            -Settings   $settings `
            -Principal  $principal `
            -Force | Out-Null

          $task = Get-ScheduledTask -TaskName "YariAutoStart" -ErrorAction SilentlyContinue
          if ($task) {
            Write-Host "[✓] Task registered successfully!"
            Write-Host "    TaskName : $($task.TaskName)"
            Write-Host "    State    : $($task.State)"
            Write-Host "    Trigger  : AtLogon ($user)"
            Write-Host "    Delay    : 15 seconds"
            Write-Host "    Action   : cmd.exe /c `"$delayScript`""
          } else {
            Write-Host "[✗] Task registration FAILED!"
          }

          Write-Host "===== RDP দিয়ে login করার 15s পর Start.bat auto-run হবে! ====="

      - name: Install Python modules
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter uiautomator2 opencv-python playwright
          playwright install

      - name: Update Dashboard API
        shell: pwsh
        run: |
          $ip      = $env:TS_IP
          $serial  = "${{ inputs.backup_number }}"
          $user    = "$env:GITHUB_ACTOR"
          $info    = "$($ip)|$($serial)|$($user)"
          $encoded = [uri]::EscapeDataString($info)
          Write-Host "Updating Dashboard..."
          Invoke-WebRequest -Uri "$($env:UPDATE_API)?info=$encoded" -Method Get -UseBasicParsing

      - name: Keep alive
        shell: pwsh
        run: |
          Write-Host "=========================================="
          Write-Host "  VM alive for 6 hours — RDP is Ready!"
          Write-Host "  IP   : $env:TS_IP"
          Write-Host "  User : $env:RDP_USER"
          Write-Host "  Pass : $env:RDP_PASS"
          Write-Host "  NOTE : Login করার 15s পর Start.bat auto-run!"
          Write-Host "=========================================="
          Start-Sleep -Seconds 21600

      - name: Done
        shell: pwsh
        run: Write-Host "Workflow Finished."
